# Sophia SEO Suite — local infrastructure (Postgres + Redis only).
# The app itself runs on the host via `pnpm dev`. This file only provisions
# the stateful services needed for local development.
services:
  postgres:
    image: postgres:16-alpine
    container_name: sophia-seo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: seo
      POSTGRES_PASSWORD: seo
      POSTGRES_DB: sophia_seo
    ports:
      - "5432:5432"
    volumes:
      - sophia_seo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo -d sophia_seo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sophia-seo-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - sophia_seo_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sophia_seo_pgdata:
  sophia_seo_redisdata:
